<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | CollabFlow</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a2a3a 0%, #0f1a24 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background: white;
            border-radius: 28px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo i {
            font-size: 2.5rem;
            color: #3b82f6;
        }
        .logo h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-top: 8px;
            color: #1e293b;
        }
        .logo p {
            color: #64748b;
            font-size: 0.9rem;
            margin-top: 4px;
        }
        .tabs {
            display: flex;
            background: #f1f5f9;
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 28px;
        }
        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            color: #64748b;
            transition: all 0.2s;
            border: none;
            background: none;
        }
        .tab.active {
            background: white;
            color: #3b82f6;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #475569;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            font-size: 0.95rem;
            font-family: inherit;
            transition: border-color 0.2s;
            outline: none;
        }
        .form-group input:focus {
            border-color: #3b82f6;
        }
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s;
        }
        .btn-submit:hover { background: #2563eb; }
        .error-msg {
            background: #fee2e2;
            color: #b91c1c;
            padding: 12px;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-bottom: 16px;
            display: none;
        }
        .success-msg {
            background: #dcfce7;
            color: #166534;
            padding: 12px;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-bottom: 16px;
            display: none;
        }
    </style>
</head>
<body>
<div class="login-box">
    <div class="logo">
        <i class="fas fa-trello"></i>
        <h1>CollabFlow</h1>
        <p>Gestion de projets collaboratifs</p>
    </div>

    <div class="tabs">
        <button class="tab active" id="tabLogin" onclick="showTab('login')">Se connecter</button>
        <button class="tab" id="tabRegister" onclick="showTab('register')">S'inscrire</button>
    </div>

    <div id="errorMsg" class="error-msg"></div>
    <div id="successMsg" class="success-msg"></div>

    <!-- Login Form -->
    <div id="loginForm">
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="loginEmail" placeholder="votre@email.com">
        </div>
        <div class="form-group">
            <label>Mot de passe</label>
            <input type="password" id="loginPassword" placeholder="••••••••">
        </div>
        <button class="btn-submit" onclick="handleLogin()">
            <i class="fas fa-sign-in-alt"></i> Se connecter
        </button>
    </div>

    <!-- Register Form -->
    <div id="registerForm" style="display:none">
        <div class="form-group">
            <label>Nom complet</label>
            <input type="text" id="registerNom" placeholder="Votre nom">
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="registerEmail" placeholder="votre@email.com">
        </div>
        <div class="form-group">
            <label>Mot de passe</label>
            <input type="password" id="registerPassword" placeholder="••••••••">
        </div>
        <button class="btn-submit" onclick="handleRegister()">
            <i class="fas fa-user-plus"></i> Créer un compte
        </button>
    </div>
</div>

<script>
    const API = 'http://localhost:3000/api';

    // If already logged in, redirect to dashboard
    if (localStorage.getItem('token')) {
        window.location.href = 'index.html';
    }

    function showTab(tab) {
        document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
        document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
        document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
        document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
        hideMessages();
    }

    function showError(msg) {
        const el = document.getElementById('errorMsg');
        el.innerText = msg;
        el.style.display = 'block';
        document.getElementById('successMsg').style.display = 'none';
    }

    function showSuccess(msg) {
        const el = document.getElementById('successMsg');
        el.innerText = msg;
        el.style.display = 'block';
        document.getElementById('errorMsg').style.display = 'none';
    }

    function hideMessages() {
        document.getElementById('errorMsg').style.display = 'none';
        document.getElementById('successMsg').style.display = 'none';
    }

    async function handleLogin() {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;

        if (!email || !password) {
            showError('Veuillez remplir tous les champs.');
            return;
        }

        try {
            const res = await fetch(`${API}/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, motDePasse: password })
            });
            const data = await res.json();

            if (!res.ok) {
                showError(data.message);
                return;
            }

            // Save token and user info
            localStorage.setItem('token', data.token);
            localStorage.setItem('user', JSON.stringify(data.user));

            // Redirect to dashboard
            window.location.href = 'index.html';

        } catch (err) {
            showError('Erreur de connexion au serveur.');
        }
    }

    async function handleRegister() {
        const nom = document.getElementById('registerNom').value;
        const email = document.getElementById('registerEmail').value;
        const password = document.getElementById('registerPassword').value;

        if (!nom || !email || !password) {
            showError('Veuillez remplir tous les champs.');
            return;
        }

        try {
            const res = await fetch(`${API}/auth/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nom, email, motDePasse: password })
            });
            const data = await res.json();

            if (!res.ok) {
                showError(data.message);
                return;
            }

            showSuccess('Compte créé ! Vous pouvez maintenant vous connecter.');
            setTimeout(() => showTab('login'), 2000);

        } catch (err) {
            showError('Erreur de connexion au serveur.');
        }
    }
</script>
</body>
</html>
