<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | CollabFlow</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ============================================
           VARIABLES LIGHT MODE (DÉFAUT)
        ============================================ */
        :root {
            --bg-primary: #ffffff;
            --text-primary: #333333;
            --text-secondary: #666666;
            --border-color: #e2e8f0;
            --input-bg: #ffffff;
            --card-bg: #ffffff;
            --shadow: 0 20px 60px rgba(0,0,0,0.3);
            --gradient-start: #667eea;
            --gradient-end: #764ba2;
            --error-bg: #fee2e2;
            --error-color: #dc2626;
            --demo-bg: #f0f0f0;
        }

        /* ============================================
           DARK MODE VARIABLES
        ============================================ */
        [data-theme="dark"] {
            --bg-primary: #1a1a2e;
            --text-primary: #f0f3f8;
            --text-secondary: #8e9aaf;
            --border-color: #232832;
            --input-bg: #11151c;
            --card-bg: #14181f;
            --shadow: 0 20px 60px rgba(0,0,0,0.5);
            --gradient-start: #5a67d8;
            --gradient-end: #6b46c1;
            --error-bg: rgba(220, 38, 38, 0.2);
            --error-color: #f87171;
            --demo-bg: #1a1f2a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, var(--gradient-start) 0%, var(--gradient-end) 100%); 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            transition: background 0.3s ease;
        }
        
        .login-container { 
            background: var(--card-bg); 
            border-radius: 20px; 
            padding: 40px; 
            width: 400px; 
            max-width: 90%; 
            box-shadow: var(--shadow);
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }
        
        .logo { 
            text-align: center; 
            font-size: 2rem; 
            font-weight: bold; 
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 30px;
        }
        
        .logo i {
            background: none;
            -webkit-background-clip: unset;
            background-clip: unset;
            color: var(--gradient-start);
        }
        
        h2 { 
            text-align: center; 
            margin-bottom: 30px; 
            color: var(--text-primary);
        }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { 
            display: block; 
            margin-bottom: 8px; 
            color: var(--text-secondary); 
            font-weight: 600; 
        }
        .form-group input { 
            width: 100%; 
            padding: 12px; 
            border: 2px solid var(--border-color); 
            border-radius: 10px; 
            font-size: 1rem;
            background: var(--input-bg);
            color: var(--text-primary);
            transition: all 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--gradient-start);
        }
        .form-group input::placeholder {
            color: var(--text-secondary);
            opacity: 0.7;
        }
        
        .btn-login { 
            width: 100%; 
            padding: 12px; 
            background: linear-gradient(135deg, var(--gradient-start) 0%, var(--gradient-end) 100%); 
            color: white; 
            border: none; 
            border-radius: 10px; 
            font-size: 1rem; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.3s; 
        }
        .btn-login:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 5px 15px rgba(102,126,234,0.4); 
        }
        
        .error-message { 
            background: var(--error-bg); 
            color: var(--error-color); 
            padding: 10px; 
            border-radius: 8px; 
            margin-bottom: 20px; 
            display: none; 
        }
        
        .demo-info { 
            text-align: center; 
            margin-top: 20px; 
            font-size: 0.8rem; 
            color: var(--text-secondary); 
        }
        .demo-info code { 
            background: var(--demo-bg); 
            padding: 2px 6px; 
            border-radius: 4px; 
            color: var(--text-primary);
        }
        
        .loading { 
            display: none; 
            text-align: center; 
            margin-top: 10px; 
            color: var(--gradient-start); 
        }
        
        /* Dark Mode Toggle Button */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 40px;
            padding: 10px 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            color: var(--text-primary);
            z-index: 1000;
        }
        .theme-toggle:hover {
            transform: scale(1.05);
            border-color: var(--gradient-start);
        }
        .theme-toggle i {
            font-size: 1.1rem;
        }
        .theme-toggle .fa-sun { color: #f59e0b; }
        .theme-toggle .fa-moon { color: #8b5cf6; }
        
        /* Language Selector */
        .lang-selector {
            position: fixed;
            top: 20px;
            left: 20px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 8px 12px;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
            z-index: 1000;
        }
        .lang-selector:hover {
            border-color: var(--gradient-start);
        }
        .lang-selector option {
            background: var(--card-bg);
            color: var(--text-primary);
        }
        
        /* RTL Support */
        body.rtl {
            direction: rtl;
        }
        body.rtl .theme-toggle {
            right: auto;
            left: 20px;
        }
        body.rtl .lang-selector {
            left: auto;
            right: 20px;
        }
        
        /* Theme Notification */
        .theme-notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--card-bg);
            color: var(--text-primary);
            padding: 12px 24px;
            border-radius: 40px;
            z-index: 9999;
            animation: fadeInOut 2s ease;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(20px); }
            15% { opacity: 1; transform: translateY(0); }
            85% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(20px); }
        }
    </style>
</head>
<body>
    <!-- Dark Mode Toggle Button -->
    <div class="theme-toggle" id="darkModeToggle">
        <i class="fas fa-moon"></i>
        <span id="themeText">Dark</span>
    </div>
    
    <!-- Language Selector -->
    <select id="languageSelect" class="lang-selector">
        <option value="fr">🇫🇷 Français</option>
        <option value="en">🇬🇧 English</option>
        <option value="ar">🇸🇦 العربية</option>
    </select>
    
    <div class="login-container">
        <div class="logo"><i class="fas fa-trello"></i> <span id="logoText">CollabFlow</span></div>
        <h2 id="loginTitle">Connexion</h2>
        <div id="errorMessage" class="error-message"></div>
        <form id="loginForm">
            <div class="form-group">
                <label id="emailLabel"><i class="fas fa-envelope"></i> Email</label>
                <input type="email" id="email" required placeholder="admin@collabflow.com" value="admin@collabflow.com">
            </div>
            <div class="form-group">
                <label id="passwordLabel"><i class="fas fa-lock"></i> Mot de passe</label>
                <input type="password" id="password" required placeholder="••••••••" value="admin123">
            </div>
            <button type="submit" class="btn-login" id="loginBtn">Se connecter</button>
            <div id="loading" class="loading"><i class="fas fa-spinner fa-spin"></i> <span id="loadingText">Connexion en cours...</span></div>
        </form>
        <div class="demo-info">
            <i class="fas fa-flask"></i> <span id="demoText">Comptes démo:</span><br>
            <code id="demoAdmin">admin@collabflow.com</code> / <code id="demoAdminPwd">admin123</code><br>
            <code id="demoUser">user@collabflow.com</code> / <code id="demoUserPwd">user123</code>
        </div>
    </div>

    <script>
        // ============================================
        // TRADUCTIONS
        // ============================================
        const translations = {
            fr: {
                logoText: "CollabFlow",
                loginTitle: "Connexion",
                emailLabel: "Email",
                passwordLabel: "Mot de passe",
                loginBtn: "Se connecter",
                loadingText: "Connexion en cours...",
                demoText: "Comptes démo:",
                demoAdmin: "admin@collabflow.com",
                demoAdminPwd: "admin123",
                demoUser: "user@collabflow.com",
                demoUserPwd: "user123",
                themeText: "Sombre",
                errorConnection: "Erreur de connexion au serveur. Vérifiez que le backend tourne sur ",
                errorCredentials: "Email ou mot de passe incorrect"
            },
            en: {
                logoText: "CollabFlow",
                loginTitle: "Login",
                emailLabel: "Email",
                passwordLabel: "Password",
                loginBtn: "Sign in",
                loadingText: "Connecting...",
                demoText: "Demo accounts:",
                demoAdmin: "admin@collabflow.com",
                demoAdminPwd: "admin123",
                demoUser: "user@collabflow.com",
                demoUserPwd: "user123",
                themeText: "Dark",
                errorConnection: "Connection error. Make sure the backend is running on ",
                errorCredentials: "Invalid email or password"
            },
            ar: {
                logoText: "كولاب فلو",
                loginTitle: "تسجيل الدخول",
                emailLabel: "البريد الإلكتروني",
                passwordLabel: "كلمة المرور",
                loginBtn: "دخول",
                loadingText: "جاري الاتصال...",
                demoText: "حسابات تجريبية:",
                demoAdmin: "admin@collabflow.com",
                demoAdminPwd: "admin123",
                demoUser: "user@collabflow.com",
                demoUserPwd: "user123",
                themeText: "داكن",
                errorConnection: "خطأ في الاتصال بالخادم. تأكد من أن الخادم الخلفي يعمل على ",
                errorCredentials: "البريد الإلكتروني أو كلمة المرور غير صحيحة"
            }
        };
        
        let currentLang = localStorage.getItem('language') || 'fr';
        let currentTheme = localStorage.getItem('theme') || 'light';
        
        // ============================================
        // DARK MODE FUNCTIONS
        // ============================================
        function initDarkMode() {
            if (currentTheme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                document.getElementById('darkModeToggle').innerHTML = '<i class="fas fa-sun"></i> <span id="themeText">' + translations[currentLang].themeText + '</span>';
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
                document.getElementById('darkModeToggle').innerHTML = '<i class="fas fa-moon"></i> <span id="themeText">' + translations[currentLang].themeText + '</span>';
            }
        }
        
        function toggleDarkMode() {
            const newTheme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            
            const themeText = document.getElementById('themeText');
            if (newTheme === 'dark') {
                document.getElementById('darkModeToggle').innerHTML = '<i class="fas fa-sun"></i> <span id="themeText">' + translations[currentLang].themeText + '</span>';
                showThemeNotification('🌙 Mode sombre activé');
            } else {
                document.getElementById('darkModeToggle').innerHTML = '<i class="fas fa-moon"></i> <span id="themeText">' + translations[currentLang].themeText + '</span>';
                showThemeNotification('☀️ Mode clair activé');
            }
        }
        
        function showThemeNotification(message) {
            const notification = document.createElement('div');
            notification.className = 'theme-notification';
            notification.innerHTML = message;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 2000);
        }
        
        // ============================================
        // LANGUAGE FUNCTIONS
        // ============================================
        function updateTexts() {
            const t = translations[currentLang];
            document.getElementById('logoText').innerText = t.logoText;
            document.getElementById('loginTitle').innerText = t.loginTitle;
            document.getElementById('emailLabel').innerHTML = '<i class="fas fa-envelope"></i> ' + t.emailLabel;
            document.getElementById('passwordLabel').innerHTML = '<i class="fas fa-lock"></i> ' + t.passwordLabel;
            document.getElementById('loginBtn').innerText = t.loginBtn;
            document.getElementById('loadingText').innerText = t.loadingText;
            document.getElementById('demoText').innerText = t.demoText;
            document.getElementById('demoAdmin').innerText = t.demoAdmin;
            document.getElementById('demoAdminPwd').innerText = t.demoAdminPwd;
            document.getElementById('demoUser').innerText = t.demoUser;
            document.getElementById('demoUserPwd').innerText = t.demoUserPwd;
            
            // Mettre à jour le texte du bouton dark mode
            const themeText = document.getElementById('themeText');
            if (themeText) themeText.innerText = t.themeText;
            
            // RTL pour l'arabe
            if (currentLang === 'ar') {
                document.body.classList.add('rtl');
                document.getElementById('loginContainer').style.direction = 'rtl';
            } else {
                document.body.classList.remove('rtl');
            }
        }
        
        function setLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('language', lang);
            document.getElementById('languageSelect').value = lang;
            updateTexts();
            // Mettre à jour le texte du bouton dark mode après changement de langue
            const themeText = document.getElementById('themeText');
            if (themeText) themeText.innerText = translations[currentLang].themeText;
        }
        
        // ============================================
        // LOGIN FUNCTIONS
        // ============================================
        const API_URL = 'http://localhost:3002/api';
        
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const loadingDiv = document.getElementById('loading');
            const errorDiv = document.getElementById('errorMessage');
            
            loadingDiv.style.display = 'block';
            errorDiv.style.display = 'none';
            
            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();
                
                if (response.ok && data.token) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = 'index.html';
                } else {
                    errorDiv.style.display = 'block';
                    errorDiv.innerHTML = `❌ ${data.message || translations[currentLang].errorCredentials}`;
                }
            } catch (error) {
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = `❌ ${translations[currentLang].errorConnection} ${API_URL}`;
            } finally {
                loadingDiv.style.display = 'none';
            }
        };
        
        // Initialisation
        initDarkMode();
        updateTexts();
        
        // Event Listeners
        document.getElementById('darkModeToggle').addEventListener('click', toggleDarkMode);
        document.getElementById('languageSelect').addEventListener('change', (e) => setLanguage(e.target.value));
    </script>
</body>
</html>
