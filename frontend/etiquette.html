<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Étiquettes | CollabFlow</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ============================================
           VARIABLES LIGHT MODE (DÉFAUT)
        ============================================ */
        :root {
            --bg-primary: #f4f5f7;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --bg-hover: #f8f9fa;
            --text-primary: #1a1a2e;
            --text-secondary: #475569;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --shadow: 0 2px 8px rgba(0,0,0,0.05);
            --sidebar-bg: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --sidebar-text: #ffffff;
            --table-header-bg: #f8f9fa;
            --input-bg: #ffffff;
        }

        /* ============================================
           DARK MODE VARIABLES
        ============================================ */
        [data-theme="dark"] {
            --bg-primary: #0a0c10;
            --bg-secondary: #11151c;
            --bg-card: #14181f;
            --bg-hover: #1e2430;
            --text-primary: #f0f3f8;
            --text-secondary: #8e9aaf;
            --text-muted: #5b677b;
            --border-color: #232832;
            --shadow: 0 2px 8px rgba(0,0,0,0.3);
            --sidebar-bg: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            --sidebar-text: #ffffff;
            --table-header-bg: #1a1f2a;
            --input-bg: #1a1f2a;
        }

        /* ============================================
           STYLES GLOBAUX
        ============================================ */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg-primary); 
            color: var(--text-primary);
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        
        .app { display: flex; min-height: 100vh; }
        
        /* Sidebar */
        .sidebar { 
            width: 260px; 
            background: var(--sidebar-bg); 
            color: var(--sidebar-text); 
            position: fixed; 
            height: 100vh; 
            overflow-y: auto;
            transition: background 0.3s ease;
        }
        
        .logo { 
            font-size: 1.5rem; 
            font-weight: bold; 
            padding: 25px 20px; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        
        .nav-link { 
            padding: 12px 20px; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            color: var(--sidebar-text); 
            text-decoration: none; 
            transition: 0.3s; 
        }
        .nav-link:hover, .nav-link.active { background: rgba(255,255,255,0.2); border-left: 3px solid white; }
        
        /* Main Content */
        .main-content { flex: 1; margin-left: 260px; padding: 20px; }
        
        /* Top Bar */
        .top-bar { 
            background: var(--bg-card); 
            border-radius: 12px; 
            padding: 15px 25px; 
            margin-bottom: 25px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            flex-wrap: wrap; 
            gap: 15px;
            border: 1px solid var(--border-color);
            transition: background 0.3s ease;
        }
        
        .page-title { font-size: 1.3rem; color: var(--text-primary); }
        
        /* User Badge */
        .user-badge { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        .avatar-mini { 
            width: 35px; 
            height: 35px; 
            background: #667eea; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: white; 
            font-weight: bold; 
        }
        
        /* Buttons */
        .btn { 
            padding: 10px 20px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            transition: all 0.3s; 
            display: inline-flex; 
            align-items: center; 
            gap: 8px; 
            font-size: 14px; 
        }
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .btn-warning { background: #f59e0b; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-secondary { background: #64748b; color: white; }
        
        /* Card */
        .card { 
            background: var(--bg-card); 
            border-radius: 12px; 
            padding: 20px; 
            border: 1px solid var(--border-color);
            transition: background 0.3s ease;
        }
        
        /* Table */
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th, .data-table td { 
            padding: 15px; 
            text-align: left; 
            border-bottom: 1px solid var(--border-color); 
            color: var(--text-secondary);
        }
        .data-table th { 
            background: var(--table-header-bg); 
            color: var(--text-primary); 
            font-weight: 600; 
        }
        .data-table tr:hover td { background: var(--bg-hover); }
        
        /* Badge */
        .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
        
        /* Color Preview */
        .color-preview { width: 40px; height: 40px; border-radius: 8px; border: 2px solid var(--border-color); box-shadow: var(--shadow); }
        
        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { 
            background: var(--bg-card); 
            border-radius: 16px; 
            padding: 30px; 
            width: 90%; 
            max-width: 500px;
            border: 1px solid var(--border-color);
        }
        .modal-content h3 { color: var(--text-primary); margin-bottom: 15px; }
        .modal-content input, .modal-content select { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0 20px; 
            border: 1px solid var(--border-color); 
            border-radius: 8px;
            background: var(--input-bg);
            color: var(--text-primary);
        }
        .modal-content input[type="color"] { width: 60px; height: 40px; padding: 4px; cursor: pointer; }
        .modal-buttons { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
        
        /* Color Row */
        .color-row { display: flex; align-items: center; gap: 15px; margin: 10px 0 20px; }
        .color-row span { font-size: 0.9rem; color: var(--text-muted); }
        
        /* Dark Mode Toggle Switch */
        .theme-switch-wrapper { display: flex; align-items: center; }
        .theme-switch { display: inline-block; height: 30px; position: relative; width: 54px; }
        .theme-switch input { display: none; }
        .slider {
            background-color: #ccc;
            bottom: 0;
            cursor: pointer;
            left: 0;
            position: absolute;
            right: 0;
            top: 0;
            transition: .4s;
            border-radius: 34px;
        }
        .slider:before {
            background-color: white;
            bottom: 3px;
            content: "";
            height: 24px;
            left: 4px;
            position: absolute;
            transition: .4s;
            width: 24px;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: #667eea; }
        input:checked + .slider:before { transform: translateX(24px); }
        .slider .fa-sun, .slider .fa-moon {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 12px;
            color: white;
        }
        .slider .fa-sun { left: 8px; }
        .slider .fa-moon { right: 8px; }
        
        /* Language Selector */
        .lang-selector {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 6px 12px;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
        }
        .lang-selector:hover { border-color: #667eea; }
        .lang-selector option { background: var(--bg-secondary); color: var(--text-primary); }
        
        /* RTL Support */
        body.rtl { direction: rtl; }
        body.rtl .sidebar { right: 0; left: auto; }
        body.rtl .main-content { margin-right: 260px; margin-left: 0; }
        body.rtl .nav-link.active { border-left: none; border-right: 3px solid white; }
        body.rtl .data-table th, body.rtl .data-table td { text-align: right; }
        
        /* Logout Button */
        .logout-btn { background: none; border: none; color: #e74c3c; cursor: pointer; font-size: 1rem; padding: 8px 12px; border-radius: 8px; transition: 0.3s; }
        .logout-btn:hover { background: rgba(231, 76, 60, 0.1); }
        
        /* Date Badge */
        .date-badge { background: var(--bg-secondary); padding: 8px 15px; border-radius: 20px; font-size: 0.85rem; border: 1px solid var(--border-color); }
        
        /* Notification */
        .notification { position: fixed; top: 20px; right: 20px; padding: 15px 20px; border-radius: 10px; color: white; z-index: 2000; animation: slideIn 0.3s ease-out; }
        .notification-success { background: #22c55e; }
        .notification-error { background: #ef4444; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        /* Theme Notification */
        .theme-notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--bg-card);
            color: var(--text-primary);
            padding: 12px 24px;
            border-radius: 40px;
            z-index: 9999;
            animation: fadeInOut 2s ease;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(20px); }
            15% { opacity: 1; transform: translateY(0); }
            85% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(20px); }
        }
        
        /* Responsive */
        @media (max-width: 768px) { 
            .sidebar { width: 70px; } 
            .sidebar span { display: none; } 
            .main-content { margin-left: 70px; }
            body.rtl .main-content { margin-right: 70px; margin-left: 0; }
        }
        
        /* Scrollbar Dark Mode */
        [data-theme="dark"] ::-webkit-scrollbar { width: 8px; height: 8px; }
        [data-theme="dark"] ::-webkit-scrollbar-track { background: #1a1f2a; border-radius: 10px; }
        [data-theme="dark"] ::-webkit-scrollbar-thumb { background: #2a313c; border-radius: 10px; }
        [data-theme="dark"] ::-webkit-scrollbar-thumb:hover { background: #3b82f6; }
    </style>
</head>
<body>
<div class="app">
    <div class="sidebar">
        <div class="logo"><i class="fas fa-trello"></i><span id="sidebarTitle">CollabFlow</span></div>
        <div class="nav-items">
            <a href="index.html" class="nav-link"><i class="fas fa-chart-line"></i><span id="navDashboard">Dashboard</span></a>
            <a href="projets.html" class="nav-link"><i class="fas fa-folder-open"></i><span id="navProjects">Projets</span></a>
            <a href="board.html" class="nav-link"><i class="fas fa-columns"></i><span id="navBoard">Board Kanban</span></a>
            <a href="taches.html" class="nav-link"><i class="fas fa-tasks"></i><span id="navTasks">Tâches</span></a>
            <a href="roles.html" class="nav-link"><i class="fas fa-tag"></i><span id="navRoles">Rôles</span></a>
            <a href="etiquette.html" class="nav-link active"><i class="fas fa-tags"></i><span id="navLabels">Étiquettes</span></a>
            <a href="profil.html" class="nav-link"><i class="fas fa-user-circle"></i><span id="navProfile">Profil</span></a>
        </div>
    </div>
    <div class="main-content">
        <div class="top-bar">
            <h1 class="page-title"><i class="fas fa-tags"></i> <span id="pageTitle">Gestion des étiquettes</span></h1>
            <div class="user-badge">
                <div class="date-badge" id="currentDate"></div>
                
                <!-- Dark Mode Toggle -->
                <div class="theme-switch-wrapper">
                    <label class="theme-switch">
                        <input type="checkbox" id="darkModeToggle">
                        <span class="slider">
                            <i class="fas fa-sun"></i>
                            <i class="fas fa-moon"></i>
                        </span>
                    </label>
                </div>
                
                <!-- Language Selector -->
                <select id="languageSelect" class="lang-selector">
                    <option value="fr">🇫🇷 Français</option>
                    <option value="en">🇬🇧 English</option>
                    <option value="ar">🇸🇦 العربية</option>
                </select>
                
                <span id="userName">Chargement...</span>
                <div class="avatar-mini" id="userAvatar">👤</div>
                <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> <span id="logoutText">Déconnexion</span></button>
            </div>
        </div>
        <div style="margin-bottom:20px; text-align:right;">
            <button class="btn btn-primary" id="openAddLabelModal"><i class="fas fa-plus"></i> <span id="newLabelText">Nouvelle étiquette</span></button>
        </div>
        <div class="card">
            <table class="data-table">
                <thead>
                    <tr>
                        <th id="thName">Nom</th>
                        <th id="thColor">Couleur</th>
                        <th id="thDescription">Description</th>
                        <th id="thActions">Actions</th>
                    </tr>
                </thead>
                <tbody id="labelsList">
                    <tr><td colspan="4" style="text-align:center;" id="loadingText">Chargement...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal Ajout/Modification Étiquette -->
<div id="labelModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">Ajouter une étiquette</h3>
        <input type="hidden" id="labelId">
        <label id="labelNameText">Nom de l'étiquette</label>
        <input type="text" id="labelNom" placeholder="Ex: Urgent, Bug, Feature..." required>
        <label id="labelColorText">Couleur</label>
        <div class="color-row">
            <input type="color" id="labelCouleur" value="#667eea">
            <span id="colorPreviewText">#667eea</span>
        </div>
        <label id="labelDescText">Description (optionnelle)</label>
        <input type="text" id="labelDescription" placeholder="Description de l'étiquette">
        <div class="modal-buttons">
            <button class="btn btn-secondary" id="closeLabelModal"><span id="cancelText">Annuler</span></button>
            <button class="btn btn-primary" id="saveLabelBtn"><span id="saveText">Enregistrer</span></button>
        </div>
    </div>
</div>

<script>
    // ============================================
    // TRADUCTIONS
    // ============================================
    const translations = {
        fr: {
            sidebarTitle: "CollabFlow",
            navDashboard: "Tableau de bord",
            navProjects: "Projets",
            navBoard: "Board Kanban",
            navTasks: "Tâches",
            navRoles: "Rôles",
            navLabels: "Étiquettes",
            navProfile: "Profil",
            pageTitle: "Gestion des étiquettes",
            newLabelText: "Nouvelle étiquette",
            thName: "Nom",
            thColor: "Couleur",
            thDescription: "Description",
            thActions: "Actions",
            loadingText: "Chargement...",
            modalTitleAdd: "Ajouter une étiquette",
            modalTitleEdit: "Modifier l'étiquette",
            labelNameText: "Nom de l'étiquette",
            labelColorText: "Couleur",
            labelDescText: "Description (optionnelle)",
            cancelText: "Annuler",
            saveText: "Enregistrer",
            logoutText: "Déconnexion",
            noLabels: "Aucune étiquette. Cliquez sur \"Nouvelle étiquette\" pour commencer.",
            labelCreated: "Étiquette créée avec succès",
            labelUpdated: "Étiquette modifiée avec succès",
            labelDeleted: "Étiquette supprimée avec succès",
            nameRequired: "Le nom de l'étiquette est requis",
            errorLoading: "Erreur de chargement des étiquettes",
            errorSave: "Erreur lors de la sauvegarde",
            errorDelete: "Erreur lors de la suppression",
            serverError: "Erreur de connexion au serveur",
            confirmDelete: "Êtes-vous sûr de vouloir supprimer cette étiquette ?"
        },
        en: {
            sidebarTitle: "CollabFlow",
            navDashboard: "Dashboard",
            navProjects: "Projects",
            navBoard: "Kanban Board",
            navTasks: "Tasks",
            navRoles: "Roles",
            navLabels: "Labels",
            navProfile: "Profile",
            pageTitle: "Label Management",
            newLabelText: "New label",
            thName: "Name",
            thColor: "Color",
            thDescription: "Description",
            thActions: "Actions",
            loadingText: "Loading...",
            modalTitleAdd: "Add label",
            modalTitleEdit: "Edit label",
            labelNameText: "Label name",
            labelColorText: "Color",
            labelDescText: "Description (optional)",
            cancelText: "Cancel",
            saveText: "Save",
            logoutText: "Logout",
            noLabels: "No labels. Click \"New label\" to start.",
            labelCreated: "Label created successfully",
            labelUpdated: "Label updated successfully",
            labelDeleted: "Label deleted successfully",
            nameRequired: "Label name is required",
            errorLoading: "Error loading labels",
            errorSave: "Error saving label",
            errorDelete: "Error deleting label",
            serverError: "Server connection error",
            confirmDelete: "Are you sure you want to delete this label?"
        },
        ar: {
            sidebarTitle: "كولاب فلو",
            navDashboard: "لوحة القيادة",
            navProjects: "المشاريع",
            navBoard: "مجلس كانبان",
            navTasks: "المهام",
            navRoles: "الأدوار",
            navLabels: "العلامات",
            navProfile: "الملف الشخصي",
            pageTitle: "إدارة العلامات",
            newLabelText: "علامة جديدة",
            thName: "الاسم",
            thColor: "اللون",
            thDescription: "الوصف",
            thActions: "الإجراءات",
            loadingText: "جاري التحميل...",
            modalTitleAdd: "إضافة علامة",
            modalTitleEdit: "تعديل العلامة",
            labelNameText: "اسم العلامة",
            labelColorText: "اللون",
            labelDescText: "الوصف (اختياري)",
            cancelText: "إلغاء",
            saveText: "حفظ",
            logoutText: "تسجيل خروج",
            noLabels: "لا توجد علامات. انقر على \"علامة جديدة\" للبدء.",
            labelCreated: "تم إنشاء العلامة بنجاح",
            labelUpdated: "تم تعديل العلامة بنجاح",
            labelDeleted: "تم حذف العلامة بنجاح",
            nameRequired: "اسم العلامة مطلوب",
            errorLoading: "خطأ في تحميل العلامات",
            errorSave: "خطأ في حفظ العلامة",
            errorDelete: "خطأ في حذف العلامة",
            serverError: "خطأ في الاتصال بالخادم",
            confirmDelete: "هل أنت متأكد من حذف هذه العلامة؟"
        }
    };
    
    let currentLang = localStorage.getItem('language') || 'fr';
    let currentTheme = localStorage.getItem('theme') || 'light';
    
    // ============================================
    // DARK MODE FUNCTIONS
    // ============================================
    function initDarkMode() {
        if (currentTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            const toggle = document.getElementById('darkModeToggle');
            if (toggle) toggle.checked = true;
        } else {
            document.documentElement.setAttribute('data-theme', 'light');
        }
    }
    
    function toggleDarkMode() {
        const newTheme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        showThemeNotification(newTheme === 'dark' ? '🌙 Mode sombre activé' : '☀️ Mode clair activé');
    }
    
    function showThemeNotification(message) {
        const notification = document.createElement('div');
        notification.className = 'theme-notification';
        notification.innerHTML = message;
        document.body.appendChild(notification);
        setTimeout(() => notification.remove(), 2000);
    }
    
    // ============================================
    // LANGUAGE FUNCTIONS
    // ============================================
    function updateTexts() {
        const t = translations[currentLang];
        document.getElementById('sidebarTitle').innerText = t.sidebarTitle;
        document.getElementById('navDashboard').innerText = t.navDashboard;
        document.getElementById('navProjects').innerText = t.navProjects;
        document.getElementById('navBoard').innerText = t.navBoard;
        document.getElementById('navTasks').innerText = t.navTasks;
        document.getElementById('navRoles').innerText = t.navRoles;
        document.getElementById('navLabels').innerText = t.navLabels;
        document.getElementById('navProfile').innerText = t.navProfile;
        document.getElementById('pageTitle').innerText = t.pageTitle;
        document.getElementById('newLabelText').innerText = t.newLabelText;
        document.getElementById('thName').innerText = t.thName;
        document.getElementById('thColor').innerText = t.thColor;
        document.getElementById('thDescription').innerText = t.thDescription;
        document.getElementById('thActions').innerText = t.thActions;
        document.getElementById('logoutText').innerText = t.logoutText;
        
        // RTL pour l'arabe
        if (currentLang === 'ar') {
            document.body.classList.add('rtl');
        } else {
            document.body.classList.remove('rtl');
        }
    }
    
    function setLanguage(lang) {
        currentLang = lang;
        localStorage.setItem('language', lang);
        document.getElementById('languageSelect').value = lang;
        updateTexts();
        loadLabels(); // Recharger les étiquettes
    }
    
    // ============================================
    // LABELS FUNCTIONS
    // ============================================
    const API_URL = 'http://localhost:3002/api';
    const token = localStorage.getItem('token');
    if (!token) window.location.href = 'login.html';
    
    let labels = [];
    
    function showNotification(message, type = 'success') {
        const notification = document.createElement('div');
        notification.className = `notification notification-${type}`;
        notification.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i> ${message}`;
        document.body.appendChild(notification);
        setTimeout(() => notification.remove(), 3000);
    }
    
    async function loadLabels() {
        try {
            const res = await fetch(`${API_URL}/etiquettes`, { headers: { 'Authorization': `Bearer ${token}` } });
            if (res.status === 401) { localStorage.clear(); window.location.href = 'login.html'; return; }
            labels = await res.json();
            const tbody = document.getElementById('labelsList');
            const t = translations[currentLang];
            
            if (labels.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;">${t.noLabels}</td></tr>`;
                return;
            }
            tbody.innerHTML = labels.map(l => `
                <tr>
                    <td><strong>${escapeHtml(l.nom)}</strong></td>
                    <td><div class="color-preview" style="background: ${l.couleur};"></div></td>
                    <td>${escapeHtml(l.description) || '-'}</td>
                    <td>
                        <button class="btn btn-warning" onclick="editLabel('${l._id}')" style="padding:5px 10px;"><i class="fas fa-edit"></i></button>
                        <button class="btn btn-danger" onclick="deleteLabel('${l._id}')" style="padding:5px 10px;"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        } catch (error) {
            console.error('Erreur:', error);
            showNotification(translations[currentLang].errorLoading, 'error');
        }
    }
    
    async function saveLabel() {
        const id = document.getElementById('labelId').value;
        const nom = document.getElementById('labelNom').value.trim();
        const couleur = document.getElementById('labelCouleur').value;
        const description = document.getElementById('labelDescription').value.trim();
        const t = translations[currentLang];
        
        if (!nom) {
            showNotification(t.nameRequired, 'error');
            return;
        }
        
        const data = { nom, couleur, description };
        
        try {
            let response;
            if (id) {
                response = await fetch(`${API_URL}/etiquettes/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify(data)
                });
            } else {
                response = await fetch(`${API_URL}/etiquettes`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify(data)
                });
            }
            
            if (response.ok) {
                showNotification(id ? t.labelUpdated : t.labelCreated, 'success');
                closeModal();
                loadLabels();
            } else {
                const error = await response.json();
                showNotification(error.message || t.errorSave, 'error');
            }
        } catch (error) {
            console.error('Erreur:', error);
            showNotification(t.serverError, 'error');
        }
    }
    
    async function editLabel(id) {
        try {
            const res = await fetch(`${API_URL}/etiquettes/${id}`, { headers: { 'Authorization': `Bearer ${token}` } });
            if (res.ok) {
                const label = await res.json();
                const t = translations[currentLang];
                document.getElementById('modalTitle').innerText = t.modalTitleEdit;
                document.getElementById('labelId').value = label._id;
                document.getElementById('labelNom').value = label.nom;
                document.getElementById('labelCouleur').value = label.couleur || '#667eea';
                document.getElementById('colorPreviewText').innerText = label.couleur || '#667eea';
                document.getElementById('labelDescription').value = label.description || '';
                document.getElementById('labelModal').style.display = 'flex';
            } else {
                showNotification(translations[currentLang].errorLoading, 'error');
            }
        } catch (error) {
            showNotification(translations[currentLang].serverError, 'error');
        }
    }
    
    async function deleteLabel(id) {
        const t = translations[currentLang];
        if (!confirm(t.confirmDelete)) return;
        
        try {
            const response = await fetch(`${API_URL}/etiquettes/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            
            if (response.ok) {
                showNotification(t.labelDeleted, 'success');
                loadLabels();
            } else {
                showNotification(t.errorDelete, 'error');
            }
        } catch (error) {
            showNotification(t.serverError, 'error');
        }
    }
    
    function openAddModal() {
        const t = translations[currentLang];
        document.getElementById('modalTitle').innerText = t.modalTitleAdd;
        document.getElementById('labelId').value = '';
        document.getElementById('labelNom').value = '';
        document.getElementById('labelCouleur').value = '#667eea';
        document.getElementById('colorPreviewText').innerText = '#667eea';
        document.getElementById('labelDescription').value = '';
        document.getElementById('labelModal').style.display = 'flex';
    }
    
    function closeModal() {
        document.getElementById('labelModal').style.display = 'none';
    }
    
    async function loadUserInfo() {
        try {
            const response = await fetch(`${API_URL}/auth/profil`, { headers: { 'Authorization': `Bearer ${token}` } });
            if (response.ok) {
                const user = await response.json();
                document.getElementById('userName').innerText = user.nom;
                document.getElementById('userAvatar').innerText = user.nom?.charAt(0).toUpperCase() || '👤';
            }
        } catch (error) {}
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }
    
    function logout() {
        localStorage.clear();
        window.location.href = 'login.html';
    }
    
    // Mise à jour de l'aperçu de la couleur
    document.getElementById('labelCouleur').addEventListener('input', (e) => {
        document.getElementById('colorPreviewText').innerText = e.target.value;
    });
    
    // Événements
    document.getElementById('currentDate').innerText = new Date().toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
    document.getElementById('openAddLabelModal').onclick = openAddModal;
    document.getElementById('closeLabelModal').onclick = closeModal;
    document.getElementById('saveLabelBtn').onclick = saveLabel;
    
    // Mise à jour des traductions pour la modale
    function updateModalTexts() {
        const t = translations[currentLang];
        document.getElementById('labelNameText').innerText = t.labelNameText;
        document.getElementById('labelColorText').innerText = t.labelColorText;
        document.getElementById('labelDescText').innerText = t.labelDescText;
        document.getElementById('cancelText').innerText = t.cancelText;
        document.getElementById('saveText').innerText = t.saveText;
    }
    
    // Override pour mettre à jour les textes de la modale
    const originalUpdateTexts = updateTexts;
    window.updateTexts = function() {
        originalUpdateTexts();
        updateModalTexts();
    };
    updateTexts = window.updateTexts;
    
    // Initialisation
    initDarkMode();
    updateTexts();
    updateModalTexts();
    
    document.getElementById('darkModeToggle').addEventListener('change', toggleDarkMode);
    document.getElementById('languageSelect').addEventListener('change', (e) => setLanguage(e.target.value));
    
    window.editLabel = editLabel;
    window.deleteLabel = deleteLabel;
    window.logout = logout;
    
    // Fermer la modale en cliquant à l'extérieur
    window.onclick = (event) => {
        if (event.target.classList.contains('modal')) {
            closeModal();
        }
    };
    
    loadUserInfo();
    loadLabels();
</script>
</body>
</html>
