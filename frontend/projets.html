<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projets | CollabFlow</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ============================================
           VARIABLES LIGHT MODE (DÉFAUT)
        ============================================ */
        :root {
            --bg-primary: #f4f5f7;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --bg-hover: #f8f9fa;
            --text-primary: #1a1a2e;
            --text-secondary: #475569;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --shadow: 0 2px 8px rgba(0,0,0,0.05);
            --sidebar-bg: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --sidebar-text: #ffffff;
            --input-bg: #ffffff;
            --table-header-bg: #f8f9fa;
            --filter-bg: #ffffff;
            --topbar-bg: #ffffff;
        }

        /* ============================================
           DARK MODE VARIABLES
        ============================================ */
        [data-theme="dark"] {
            --bg-primary: #0a0c10;
            --bg-secondary: #11151c;
            --bg-card: #14181f;
            --bg-hover: #1e2430;
            --text-primary: #f0f3f8;
            --text-secondary: #8e9aaf;
            --text-muted: #5b677b;
            --border-color: #232832;
            --shadow: 0 2px 8px rgba(0,0,0,0.3);
            --sidebar-bg: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            --sidebar-text: #ffffff;
            --input-bg: #1a1f2a;
            --table-header-bg: #1a1f2a;
            --filter-bg: #1a1f2a;
            --topbar-bg: #11151c;
        }

        /* ============================================
           STYLES GLOBAUX
        ============================================ */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg-primary); 
            color: var(--text-primary);
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        
        .app { display: flex; min-height: 100vh; }
        
        /* Sidebar */
        .sidebar { 
            width: 260px; 
            background: var(--sidebar-bg); 
            color: var(--sidebar-text); 
            position: fixed; 
            height: 100vh; 
            overflow-y: auto;
            transition: background 0.3s ease;
        }
        
        .logo { 
            font-size: 1.5rem; 
            font-weight: bold; 
            padding: 25px 20px; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        
        .nav-link { 
            padding: 12px 20px; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            color: var(--sidebar-text); 
            text-decoration: none; 
            transition: 0.3s; 
        }
        .nav-link:hover, .nav-link.active { background: rgba(255,255,255,0.2); border-left: 3px solid white; }
        
        /* Main Content */
        .main-content { flex: 1; margin-left: 260px; padding: 20px; }
        
        /* Top Bar */
        .top-bar { 
            background: var(--topbar-bg); 
            border-radius: 12px; 
            padding: 15px 25px; 
            margin-bottom: 25px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            flex-wrap: wrap; 
            gap: 15px;
            border: 1px solid var(--border-color);
            transition: background 0.3s ease;
        }
        
        .page-title { font-size: 1.3rem; color: var(--text-primary); }
        
        /* User Badge */
        .user-badge { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        .avatar-mini { 
            width: 35px; 
            height: 35px; 
            background: #667eea; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: white; 
            font-weight: bold; 
        }
        
        /* Buttons */
        .btn { 
            padding: 10px 20px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            transition: all 0.3s; 
            display: inline-flex; 
            align-items: center; 
            gap: 8px; 
            font-size: 14px; 
        }
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .btn-warning { background: #f59e0b; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-secondary { background: #64748b; color: white; }
        
        /* Card */
        .card { 
            background: var(--bg-card); 
            border-radius: 12px; 
            padding: 20px; 
            border: 1px solid var(--border-color);
            transition: background 0.3s ease;
        }
        
        /* Table */
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th, .data-table td { 
            padding: 15px; 
            text-align: left; 
            border-bottom: 1px solid var(--border-color); 
            color: var(--text-secondary);
        }
        .data-table th { 
            background: var(--table-header-bg); 
            color: var(--text-primary); 
            font-weight: 600; 
        }
        .data-table tr:hover td { background: var(--bg-hover); }
        
        /* Badge */
        .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
        .status-actif { background: #dbeafe; color: #2563eb; }
        .status-termine { background: #dcfce7; color: #16a34a; }
        .status-archive { background: #fee2e2; color: #dc2626; }
        
        /* Progress Bar */
        .progress-bar { background: var(--border-color); border-radius: 10px; overflow: hidden; width: 120px; height: 8px; }
        .progress-fill { background: linear-gradient(135deg, #667eea, #764ba2); height: 100%; border-radius: 10px; }
        
        /* Filter Bar */
        .filter-bar { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
        .filter-bar select, .filter-bar input { 
            padding: 8px 15px; 
            border: 1px solid var(--border-color); 
            border-radius: 8px;
            background: var(--filter-bg);
            color: var(--text-primary);
        }
        
        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { 
            background: var(--bg-card); 
            border-radius: 16px; 
            padding: 30px; 
            width: 90%; 
            max-width: 550px;
            border: 1px solid var(--border-color);
        }
        .modal-content h3 { color: var(--text-primary); margin-bottom: 15px; }
        .modal-content input, .modal-content select, .modal-content textarea { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0 20px; 
            border: 1px solid var(--border-color); 
            border-radius: 8px;
            background: var(--input-bg);
            color: var(--text-primary);
        }
        .modal-buttons { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
        
        /* Dark Mode Toggle */
        .theme-switch-wrapper { display: flex; align-items: center; }
        .theme-switch { display: inline-block; height: 30px; position: relative; width: 54px; }
        .theme-switch input { display: none; }
        .slider {
            background-color: #ccc;
            bottom: 0;
            cursor: pointer;
            left: 0;
            position: absolute;
            right: 0;
            top: 0;
            transition: .4s;
            border-radius: 34px;
        }
        .slider:before {
            background-color: white;
            bottom: 3px;
            content: "";
            height: 24px;
            left: 4px;
            position: absolute;
            transition: .4s;
            width: 24px;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: #667eea; }
        input:checked + .slider:before { transform: translateX(24px); }
        .slider .fa-sun, .slider .fa-moon {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 12px;
            color: white;
        }
        .slider .fa-sun { left: 8px; }
        .slider .fa-moon { right: 8px; }
        
        /* Language Selector */
        .lang-selector {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 6px 12px;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
        }
        .lang-selector:hover { border-color: #667eea; }
        .lang-selector option { background: var(--bg-secondary); color: var(--text-primary); }
        
        /* RTL Support */
        body.rtl { direction: rtl; }
        body.rtl .sidebar { right: 0; left: auto; }
        body.rtl .main-content { margin-right: 260px; margin-left: 0; }
        body.rtl .nav-link.active { border-left: none; border-right: 3px solid white; }
        body.rtl .data-table th, body.rtl .data-table td { text-align: right; }
        body.rtl .filter-bar { flex-direction: row-reverse; }
        body.rtl .modal-buttons { flex-direction: row-reverse; }
        
        /* Logout Button */
        .logout-btn { background: none; border: none; color: #e74c3c; cursor: pointer; font-size: 1rem; padding: 8px 12px; border-radius: 8px; transition: 0.3s; }
        .logout-btn:hover { background: rgba(231, 76, 60, 0.1); }
        
        /* Date Badge */
        .date-badge { background: var(--bg-secondary); padding: 8px 15px; border-radius: 20px; font-size: 0.85rem; border: 1px solid var(--border-color); }
        
        /* Notification */
        .notification { position: fixed; top: 20px; right: 20px; padding: 15px 20px; border-radius: 10px; color: white; z-index: 2000; animation: slideIn 0.3s ease-out; }
        .notification-success { background: #22c55e; }
        .notification-error { background: #ef4444; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        /* Theme Notification */
        .theme-notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--bg-card);
            color: var(--text-primary);
            padding: 12px 24px;
            border-radius: 40px;
            z-index: 9999;
            animation: fadeInOut 2s ease;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(20px); }
            15% { opacity: 1; transform: translateY(0); }
            85% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(20px); }
        }
        
        /* Responsive */
        @media (max-width: 768px) { 
            .sidebar { width: 70px; } 
            .sidebar span { display: none; } 
            .main-content { margin-left: 70px; } 
            body.rtl .main-content { margin-right: 70px; margin-left: 0; }
        }
        
        /* Scrollbar Dark Mode */
        [data-theme="dark"] ::-webkit-scrollbar { width: 8px; height: 8px; }
        [data-theme="dark"] ::-webkit-scrollbar-track { background: #1a1f2a; border-radius: 10px; }
        [data-theme="dark"] ::-webkit-scrollbar-thumb { background: #2a313c; border-radius: 10px; }
        [data-theme="dark"] ::-webkit-scrollbar-thumb:hover { background: #3b82f6; }
    </style>
</head>
<body>
<div class="app">
    <div class="sidebar">
        <div class="logo"><i class="fas fa-trello"></i><span id="sidebarTitle">CollabFlow</span></div>
        <div class="nav-items">
            <a href="index.html" class="nav-link"><i class="fas fa-chart-line"></i><span id="navDashboard">Dashboard</span></a>
            <a href="projets.html" class="nav-link active"><i class="fas fa-folder-open"></i><span id="navProjects">Projets</span></a>
            <a href="board.html" class="nav-link"><i class="fas fa-columns"></i><span id="navBoard">Board Kanban</span></a>
            <a href="taches.html" class="nav-link"><i class="fas fa-tasks"></i><span id="navTasks">Tâches</span></a>
            <a href="roles.html" class="nav-link"><i class="fas fa-tag"></i><span id="navRoles">Rôles</span></a>
            <a href="etiquette.html" class="nav-link"><i class="fas fa-tags"></i><span id="navLabels">Étiquettes</span></a>
            <a href="profil.html" class="nav-link"><i class="fas fa-user-circle"></i><span id="navProfile">Profil</span></a>
        </div>
    </div>
    <div class="main-content">
        <div class="top-bar">
            <h1 class="page-title"><i class="fas fa-folder-open"></i> <span id="pageTitle">Gestion des projets</span></h1>
            <div class="user-badge">
                <div class="date-badge" id="currentDate"></div>
                
                <!-- Dark Mode Toggle -->
                <div class="theme-switch-wrapper">
                    <label class="theme-switch">
                        <input type="checkbox" id="darkModeToggle">
                        <span class="slider">
                            <i class="fas fa-sun"></i>
                            <i class="fas fa-moon"></i>
                        </span>
                    </label>
                </div>
                
                <!-- Language Selector -->
                <select id="languageSelect" class="lang-selector">
                    <option value="fr">🇫🇷 Français</option>
                    <option value="en">🇬🇧 English</option>
                    <option value="ar">🇸🇦 العربية</option>
                </select>
                
                <span id="userName">Chargement...</span>
                <div class="avatar-mini" id="userAvatar">👤</div>
                <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> <span id="logoutText">Déconnexion</span></button>
            </div>
        </div>
        
        <div class="filter-bar">
            <select id="filterStatut">
                <option value="" id="allStatusOption">Tous les statuts</option>
                <option value="actif" id="activeStatusOption">Actif</option>
                <option value="termine" id="completedStatusOption">Terminé</option>
                <option value="archive" id="archivedStatusOption">Archivé</option>
            </select>
            <input type="text" id="searchNom" placeholder="Rechercher un projet...">
            <button class="btn btn-primary" onclick="applyFilters()"><i class="fas fa-search"></i> <span id="filterBtnText">Filtrer</span></button>
            <button class="btn btn-secondary" onclick="resetFilters()"><i class="fas fa-undo"></i> <span id="resetBtnText">Réinitialiser</span></button>
        </div>
        
        <div style="margin-bottom:20px; text-align:right;">
            <button class="btn btn-primary" id="openAddProjectModal"><i class="fas fa-plus"></i> <span id="newProjectBtnText">Nouveau projet</span></button>
        </div>
        
        <div class="card">
            <table class="data-table">
                <thead>
                    <tr>
                        <th id="thName">Nom</th>
                        <th id="thDescription">Description</th>
                        <th id="thProgress">Avancement</th>
                        <th id="thStatus">Statut</th>
                        <th id="thEndDate">Date fin</th>
                        <th id="thActions">Actions</th>
                    </tr>
                </thead>
                <tbody id="projectsList"><td><td colspan="6" id="loadingProjectsText">Chargement...</td></tr></tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal Ajout -->
<div id="addProjectModal" class="modal">
    <div class="modal-content">
        <h3 id="addModalTitle">Nouveau projet</h3>
        <form id="addProjectForm">
            <input type="text" id="addNom" placeholder="Nom du projet" required>
            <textarea id="addDescription" placeholder="Description" rows="3"></textarea>
            <select id="addStatut">
                <option value="actif">Actif</option>
                <option value="termine">Terminé</option>
                <option value="archive">Archivé</option>
            </select>
            <input type="number" id="addAvancement" placeholder="Avancement (0-100)" min="0" max="100" value="0">
            <input type="date" id="addDateFin">
            <div class="modal-buttons">
                <button type="button" class="btn btn-secondary" id="closeAddModal"><span id="cancelAddText">Annuler</span></button>
                <button type="submit" class="btn btn-primary"><span id="createText">Créer</span></button>
            </div>
        </form>
    </div>
</div>

<!-- Modal Modification -->
<div id="editProjectModal" class="modal">
    <div class="modal-content">
        <h3 id="editModalTitle">Modifier le projet</h3>
        <form id="editProjectForm">
            <input type="hidden" id="editProjectId">
            <input type="text" id="editNom" placeholder="Nom du projet" required>
            <textarea id="editDescription" placeholder="Description" rows="3"></textarea>
            <select id="editStatut">
                <option value="actif">Actif</option>
                <option value="termine">Terminé</option>
                <option value="archive">Archivé</option>
            </select>
            <input type="number" id="editAvancement" placeholder="Avancement (0-100)" min="0" max="100">
            <input type="date" id="editDateFin">
            <div class="modal-buttons">
                <button type="button" class="btn btn-secondary" id="closeEditModal"><span id="cancelEditText">Annuler</span></button>
                <button type="submit" class="btn btn-primary"><span id="saveText">Enregistrer</span></button>
            </div>
        </form>
    </div>
</div>

<script>
    // ============================================
    // TRADUCTIONS
    // ============================================

            confirmDelete: "هل تريد حذف هذا المشروع؟"
        }
    };
    
    let currentLang = localStorage.getItem('language') || 'fr';
    let currentTheme = localStorage.getItem('theme') || 'light';
    
    // ============================================
    // DARK MODE FUNCTIONS
    // ============================================
    function initDarkMode() {
        if (currentTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            const toggle = document.getElementById('darkModeToggle');
            if (toggle) toggle.checked = true;
        } else {
            document.documentElement.setAttribute('data-theme', 'light');
        }
    }
    
    function toggleDarkMode() {
        const newTheme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        showThemeNotification(newTheme === 'dark' ? '🌙 Mode sombre activé' : '☀️ Mode clair activé');
    }
    
    function showThemeNotification(message) {
        const notification = document.createElement('div');
        notification.className = 'theme-notification';
        notification.innerHTML = message;
        document.body.appendChild(notification);
        setTimeout(() => notification.remove(), 2000);
    }
    
    // ============================================
    // LANGUAGE FUNCTIONS
    // ============================================
    function updateTexts() {
        const t = translations[currentLang];
        document.getElementById('sidebarTitle').innerText = t.sidebarTitle;
        document.getElementById('navDashboard').innerText = t.navDashboard;
        document.getElementById('navProjects').innerText = t.navProjects;
        document.getElementById('navBoard').innerText = t.navBoard;
        document.getElementById('navTasks').innerText = t.navTasks;
        document.getElementById('navRoles').innerText = t.navRoles;
        document.getElementById('navLabels').innerText = t.navLabels;
        document.getElementById('navProfile').innerText = t.navProfile;
        document.getElementById('pageTitle').innerText = t.pageTitle;
        document.getElementById('logoutText').innerText = t.logoutText;
        document.getElementById('allStatusOption').innerText = t.allStatusOption;
        document.getElementById('activeStatusOption').innerText = t.activeStatusOption;
        document.getElementById('completedStatusOption').innerText = t.completedStatusOption;
        document.getElementById('archivedStatusOption').innerText = t.archivedStatusOption;
        document.getElementById('filterBtnText').innerText = t.filterBtnText;
        document.getElementById('resetBtnText').innerText = t.resetBtnText;
        document.getElementById('newProjectBtnText').innerText = t.newProjectBtnText;
        document.getElementById('thName').innerText = t.thName;
        document.getElementById('thDescription').innerText = t.thDescription;
        document.getElementById('thProgress').innerText = t.thProgress;
        document.getElementById('thStatus').innerText = t.thStatus;
        document.getElementById('thEndDate').innerText = t.thEndDate;
        document.getElementById('thActions').innerText = t.thActions;
        document.getElementById('loadingProjectsText').innerText = t.loadingProjectsText;
        document.getElementById('addModalTitle').innerText = t.addModalTitle;
        document.getElementById('editModalTitle').innerText = t.editModalTitle;
        document.getElementById('cancelAddText').innerText = t.cancelAddText;
        document.getElementById('createText').innerText = t.createText;
        document.getElementById('cancelEditText').innerText = t.cancelEditText;
        document.getElementById('saveText').innerText = t.saveText;
        
        // RTL pour l'arabe
        if (currentLang === 'ar') {
            document.body.classList.add('rtl');
        } else {
            document.body.classList.remove('rtl');
        }
    }
    
    function setLanguage(lang) {
        currentLang = lang;
        localStorage.setItem('language', lang);
        document.getElementById('languageSelect').value = lang;
        updateTexts();
        loadProjects(); // Recharger les projets
    }
    
    // ============================================
    // PROJECT FUNCTIONS
    // ============================================
    const API_URL = 'http://localhost:3002/api';
    const token = localStorage.getItem('token');
    if (!token) window.location.href = 'login.html';
    
    let allProjects = [];
    
    function showNotification(msg, type = 'success') {
        const n = document.createElement('div');
        n.className = `notification notification-${type}`;
        n.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i> ${msg}`;
        document.body.appendChild(n);
        setTimeout(() => n.remove(), 3000);
    }
    
    function getStatusText(s) { 
        const t = translations[currentLang];
        return { actif: t.activeStatusOption, termine: t.completedStatusOption, archive: t.archivedStatusOption }[s] || 'Actif'; 
    }
    function getStatusClass(s) { return { actif: 'status-actif', termine: 'status-termine', archive: 'status-archive' }[s] || 'status-actif'; }
    function formatDate(d) { return d ? new Date(d).toLocaleDateString('fr-FR') : '-'; }
    
    async function loadProjects() {
        try {
            const res = await fetch(`${API_URL}/projets`, { headers: { 'Authorization': `Bearer ${token}` } });
            if (res.status === 401) { localStorage.clear(); window.location.href = 'login.html'; return; }
            allProjects = await res.json();
            applyFilters();
        } catch (error) { showNotification(translations[currentLang].errorLoad, 'error'); }
    }
    
    function applyFilters() {
        const statut = document.getElementById('filterStatut').value;
        const search = document.getElementById('searchNom').value.toLowerCase();
        let filtered = [...allProjects];
        if (statut) filtered = filtered.filter(p => p.statut === statut);
        if (search) filtered = filtered.filter(p => p.nom?.toLowerCase().includes(search));
        renderProjects(filtered);
    }
    
    function resetFilters() { document.getElementById('filterStatut').value = ''; document.getElementById('searchNom').value = ''; applyFilters(); }
    
    function renderProjects(projects) {
        const tbody = document.getElementById('projectsList');
        if (!projects.length) { tbody.innerHTML = `<td><td colspan="6">${translations[currentLang].noProjects || 'Aucun projet'}</td></tr>`; return; }
        tbody.innerHTML = projects.map(p => `
            <tr>
                <td><strong>${escapeHtml(p.nom)}</strong></td>
                <td>${escapeHtml(p.description) || '-'}</td>
                <td><div class="progress-bar"><div class="progress-fill" style="width:${p.avancement||0}%"></div> ${p.avancement||0}%</div></td>
                <td><span class="badge ${getStatusClass(p.statut)}">${getStatusText(p.statut)}</span></td>
                <td>${formatDate(p.dateFin)}</td>
                <td><button class="btn btn-warning" onclick="editProject('${p._id}')"><i class="fas fa-edit"></i></button> <button class="btn btn-danger" onclick="deleteProject('${p._id}')"><i class="fas fa-trash"></i></button></td>
            </tr>
        `).join('');
    }
    
    async function createProject(e) {
        e.preventDefault();
        const data = {
            nom: document.getElementById('addNom').value.trim(),
            description: document.getElementById('addDescription').value,
            statut: document.getElementById('addStatut').value,
            avancement: parseInt(document.getElementById('addAvancement').value) || 0,
            dateFin: document.getElementById('addDateFin').value || null
        };
        if (!data.nom) { showNotification(translations[currentLang].nameRequired, 'error'); return; }
        try {
            const res = await fetch(`${API_URL}/projets`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify(data) });
            if (res.ok) { showNotification(translations[currentLang].projectCreated); closeAddModal(); loadProjects(); document.getElementById('addProjectForm').reset(); }
            else showNotification(translations[currentLang].errorCreate, 'error');
        } catch (error) { showNotification(translations[currentLang].errorConnection, 'error'); }
    }
    
    async function updateProject(e) {
        e.preventDefault();
        const id = document.getElementById('editProjectId').value;
        const data = {
            nom: document.getElementById('editNom').value.trim(),
            description: document.getElementById('editDescription').value,
            statut: document.getElementById('editStatut').value,
            avancement: parseInt(document.getElementById('editAvancement').value) || 0,
            dateFin: document.getElementById('editDateFin').value || null
        };
        if (!data.nom) { showNotification(translations[currentLang].nameRequired, 'error'); return; }
        try {
            const res = await fetch(`${API_URL}/projets/${id}`, { 
                method: 'PUT', 
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, 
                body: JSON.stringify(data) 
            });
            if (res.ok) { 
                showNotification(translations[currentLang].projectUpdated); 
                closeEditModal(); 
                loadProjects(); 
            } else { 
                showNotification(translations[currentLang].errorUpdate, 'error'); 
            }
        } catch (error) { 
            showNotification(translations[currentLang].errorConnection, 'error'); 
        }
    }
    
    async function editProject(id) {
        try {
            const res = await fetch(`${API_URL}/projets/${id}`, { headers: { 'Authorization': `Bearer ${token}` } });
            if (res.ok) {
                const p = await res.json();
                document.getElementById('editProjectId').value = p._id;
                document.getElementById('editNom').value = p.nom;
                document.getElementById('editDescription').value = p.description || '';
                document.getElementById('editStatut').value = p.statut || 'actif';
                document.getElementById('editAvancement').value = p.avancement || 0;
                document.getElementById('editDateFin').value = p.dateFin ? p.dateFin.split('T')[0] : '';
                document.getElementById('editProjectModal').style.display = 'flex';
            } else showNotification(translations[currentLang].errorLoad, 'error');
        } catch (error) { showNotification(translations[currentLang].errorConnection, 'error'); }
    }
    
    async function deleteProject(id) {
        if (!confirm(translations[currentLang].confirmDelete)) return;
        try {
            const res = await fetch(`${API_URL}/projets/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
            if (res.ok) { showNotification(translations[currentLang].projectDeleted); loadProjects(); }
            else showNotification(translations[currentLang].errorDelete, 'error');
        } catch (error) { showNotification(translations[currentLang].errorConnection, 'error'); }
    }
    
    function openAddModal() { document.getElementById('addProjectModal').style.display = 'flex'; }
    function closeAddModal() { document.getElementById('addProjectModal').style.display = 'none'; }
    function closeEditModal() { document.getElementById('editProjectModal').style.display = 'none'; }
    
    async function loadUserInfo() {
        try {
            const res = await fetch(`${API_URL}/auth/profil`, { headers: { 'Authorization': `Bearer ${token}` } });
            if (res.ok) { const user = await res.json(); document.getElementById('userName').innerText = user.nom; document.getElementById('userAvatar').innerText = user.nom?.charAt(0) || '👤'; }
        } catch (error) {}
    }
    
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
    function logout() { localStorage.clear(); window.location.href = 'login.html'; }
    
    document.getElementById('currentDate').innerText = new Date().toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
    document.getElementById('openAddProjectModal').onclick = openAddModal;
    document.getElementById('closeAddModal').onclick = closeAddModal;
    document.getElementById('closeEditModal').onclick = closeEditModal;
    document.getElementById('addProjectForm').onsubmit = createProject;
    document.getElementById('editProjectForm').onsubmit = updateProject;
    
    // Initialisation
    initDarkMode();
    updateTexts();
    
    document.getElementById('darkModeToggle').addEventListener('change', toggleDarkMode);
    document.getElementById('languageSelect').addEventListener('change', (e) => setLanguage(e.target.value));
    
    window.editProject = editProject;
    window.deleteProject = deleteProject;
    window.applyFilters = applyFilters;
    window.resetFilters = resetFilters;
    window.onclick = (e) => { if (e.target.classList.contains('modal')) e.target.style.display = 'none'; };
    
    loadUserInfo();
    loadProjects();
</script>
</body>
</html>
