<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journal d'audit | CollabFlow</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f5f7; color: #1a1a2e; }
        .app { display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; position: fixed; height: 100vh; overflow-y: auto; }
        .logo { font-size: 1.5rem; font-weight: bold; padding: 25px 20px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid rgba(255,255,255,0.2); }
        .nav-link { padding: 12px 20px; display: flex; align-items: center; gap: 12px; color: white; text-decoration: none; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { background: rgba(255,255,255,0.2); border-left: 3px solid white; }
        .main-content { flex: 1; margin-left: 260px; padding: 20px; }
        .top-bar { background: white; border-radius: 12px; padding: 15px 25px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #e2e8f0; }
        .card { background: white; border-radius: 12px; padding: 20px; border: 1px solid #e2e8f0; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; font-size: 14px; }
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .log-item { display: flex; align-items: flex-start; gap: 15px; padding: 15px; border-bottom: 1px solid #e2e8f0; }
        .log-icon { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
        .icon-create { background: #dcfce7; color: #16a34a; }
        .icon-update { background: #dbeafe; color: #2563eb; }
        .icon-delete { background: #fee2e2; color: #dc2626; }
        .icon-move { background: #fef3c7; color: #d97706; }
        .icon-member { background: #f3e8ff; color: #7c3aed; }
        .log-content { flex: 1; }
        .log-action { font-weight: 600; font-size: 14px; }
        .log-details { font-size: 13px; color: #64748b; margin-top: 3px; }
        .log-meta { font-size: 12px; color: #94a3b8; margin-top: 4px; }
        .project-selector { margin-bottom: 20px; display: flex; gap: 15px; align-items: center; }
        .project-selector select { padding: 10px 15px; border: 1px solid #e2e8f0; border-radius: 8px; min-width: 250px; }
        .empty-state { text-align: center; padding: 50px; color: #64748b; }
        .logout-btn { background: none; border: none; color: #e74c3c; cursor: pointer; font-size: 1rem; padding: 8px 12px; border-radius: 8px; }
    </style>
</head>
<body>
<div class="app">
    <div class="sidebar">
        <div class="logo"><i class="fas fa-trello"></i> CollabFlow</div>
        <div class="nav-items">
            <a href="index.html" class="nav-link"><i class="fas fa-chart-line"></i><span id="navDashboard">Dashboard</span></a>
            <a href="projets.html" class="nav-link"><i class="fas fa-folder-open"></i><span id="navProjects">Projets</span></a>
            <a href="board.html" class="nav-link active"><i class="fas fa-columns"></i><span id="navBoard">Board Kanban</span></a>
            <a href="taches.html" class="nav-link"><i class="fas fa-tasks"></i><span id="navTasks">Tâches</span></a>
            <a href="roles.html" class="nav-link"><i class="fas fa-tag"></i><span id="navRoles">Rôles</span></a>
            <a href="etiquette.html" class="nav-link"><i class="fas fa-tags"></i><span id="navLabels">Étiquettes</span></a>
            <a href="profil.html" class="nav-link"><i class="fas fa-user-circle"></i><span id="navProfile">Profil</span></a>
            <a href="logs.html" class="nav-link"><i class="fas fa-history"></i><span>Journal d'audit</span></a>
            <a href="membres.html" class="nav-link">
                <i class="fas fa-users"></i><span>Vue Membres</span>
            </a>
        </div>
    </div>
    <div class="main-content">
        <div class="top-bar">
            <h1 style="font-size:1.3rem;"><i class="fas fa-history"></i> Journal d'audit</h1>
            <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Déconnexion</button>
        </div>

        <div class="project-selector">
            <select id="projectSelect">
                <option value="">-- Sélectionner un projet --</option>
            </select>
            <button class="btn btn-primary" onclick="loadLogs()">
                <i class="fas fa-search"></i> Voir les logs
            </button>
        </div>

        <div class="card" id="logsContainer">
            <div class="empty-state">
                <i class="fas fa-history" style="font-size:3rem; margin-bottom:15px; opacity:0.3;"></i>
                <p>Sélectionnez un projet pour voir le journal</p>
            </div>
        </div>
    </div>
</div>

<script>
    const API_URL = 'http://localhost:3002/api';
    const token = localStorage.getItem('token');
    if (!token) window.location.href = 'login.html';

    const actionLabels = {
        CREATE_PROJECT: 'Projet créé',
        UPDATE_PROJECT: 'Projet modifié',
        DELETE_PROJECT: 'Projet supprimé',
        CREATE_TASK: 'Tâche créée',
        UPDATE_TASK: 'Tâche modifiée',
        DELETE_TASK: 'Tâche supprimée',
        MOVE_TASK: 'Tâche déplacée',
        INVITE_MEMBER: 'Membre invité',
        REMOVE_MEMBER: 'Membre retiré'
    };

    const actionIcons = {
        CREATE_PROJECT: { icon: 'fa-plus', class: 'icon-create' },
        UPDATE_PROJECT: { icon: 'fa-edit', class: 'icon-update' },
        DELETE_PROJECT: { icon: 'fa-trash', class: 'icon-delete' },
        CREATE_TASK: { icon: 'fa-plus', class: 'icon-create' },
        UPDATE_TASK: { icon: 'fa-edit', class: 'icon-update' },
        DELETE_TASK: { icon: 'fa-trash', class: 'icon-delete' },
        MOVE_TASK: { icon: 'fa-arrows-alt', class: 'icon-move' },
        INVITE_MEMBER: { icon: 'fa-user-plus', class: 'icon-member' },
        REMOVE_MEMBER: { icon: 'fa-user-minus', class: 'icon-member' }
    };

    async function loadProjects() {
        try {
            const res = await fetch(`${API_URL}/projets`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const projects = await res.json();
            const select = document.getElementById('projectSelect');
            select.innerHTML = '<option value="">-- Sélectionner un projet --</option>';
            projects.forEach(p => {
                select.innerHTML += `<option value="${p._id}">${p.nom}</option>`;
            });
        } catch (e) {}
    }

    async function loadLogs() {
        const projetId = document.getElementById('projectSelect').value;
        if (!projetId) return;

        const container = document.getElementById('logsContainer');
        container.innerHTML = '<div class="empty-state"><i class="fas fa-spinner fa-spin"></i> Chargement...</div>';

        try {
            const res = await fetch(`${API_URL}/logs/projet/${projetId}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (res.status === 403) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-lock"></i><p style="margin-top:10px;">Seul le chef de projet peut consulter les logs</p></div>';
                return;
            }

            const logs = await res.json();

            if (!logs.length) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-inbox" style="font-size:3rem; opacity:0.3;"></i><p style="margin-top:10px;">Aucune action enregistrée</p></div>';
                return;
            }

            container.innerHTML = logs.map(log => {
                const icon = actionIcons[log.action] || { icon: 'fa-info', class: 'icon-update' };
                const date = new Date(log.createdAt).toLocaleString('fr-FR');
                const user = log.userId?.name || 'Inconnu';
                return `
                    <div class="log-item">
                        <div class="log-icon ${icon.class}">
                            <i class="fas ${icon.icon}"></i>
                        </div>
                        <div class="log-content">
                            <div class="log-action">${actionLabels[log.action] || log.action}</div>
                            <div class="log-details">${log.details}</div>
                            <div class="log-meta"><i class="fas fa-user"></i> ${user} &nbsp;|&nbsp; <i class="fas fa-clock"></i> ${date}</div>
                        </div>
                    </div>
                `;
            }).join('');

        } catch (e) {
            container.innerHTML = '<div class="empty-state">Erreur de chargement</div>';
        }
    }

    function logout() { localStorage.clear(); window.location.href = 'login.html'; }

    loadProjects();
</script>
</body>
</html>
