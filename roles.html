<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rôles | CollabFlow</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f5f7; }
        .app { display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; position: fixed; height: 100vh; overflow-y: auto; }
        .logo { font-size: 1.5rem; font-weight: bold; padding: 25px 20px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid rgba(255,255,255,0.2); }
        .nav-link { padding: 12px 20px; display: flex; align-items: center; gap: 12px; color: white; text-decoration: none; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { background: rgba(255,255,255,0.2); border-left: 3px solid white; }
        .main-content { flex: 1; margin-left: 260px; padding: 20px; }
        .top-bar { background: white; border-radius: 12px; padding: 15px 25px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .page-title { font-size: 1.3rem; color: #333; }
        .user-badge { display: flex; align-items: center; gap: 15px; }
        .avatar-mini { width: 35px; height: 35px; background: #667eea; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; transition: all 0.3s; display: inline-flex; align-items: center; gap: 8px; font-size: 14px; }
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .btn-warning { background: #f59e0b; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-secondary { background: #64748b; color: white; }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th, .data-table td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        .data-table th { background: #f8f9fa; color: #333; font-weight: 600; }
        .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
        .badge-admin { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .badge-user { background: #22c55e; color: white; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; border-radius: 16px; padding: 30px; width: 90%; max-width: 500px; }
        .modal-content input, .modal-content select { width: 100%; padding: 12px; margin: 10px 0 20px; border: 1px solid #ddd; border-radius: 8px; }
        .modal-buttons { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
        .logout-btn { background: none; border: none; color: #e74c3c; cursor: pointer; }
        .date-badge { background: #f0f2f5; padding: 8px 15px; border-radius: 20px; font-size: 0.85rem; }
        .permission-group { margin: 15px 0; padding: 15px; background: #f8fafc; border-radius: 10px; }
        .permission-checkbox { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .permission-checkbox input { width: auto; margin: 0; }
        .notification { position: fixed; top: 20px; right: 20px; padding: 15px 20px; border-radius: 10px; color: white; z-index: 2000; animation: slideIn 0.3s ease-out; }
        .notification-success { background: #22c55e; }
        .notification-error { background: #ef4444; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @media (max-width: 768px) { .sidebar { width: 70px; } .sidebar span { display: none; } .main-content { margin-left: 70px; } }
    </style>
</head>
<body>
<div class="app">
    <div class="sidebar">
        <div class="logo"><i class="fas fa-trello"></i><span>CollabFlow</span></div>
        <div class="nav-items">
            <a href="index.html" class="nav-link"><i class="fas fa-chart-line"></i><span>Dashboard</span></a>
            <a href="projets.html" class="nav-link"><i class="fas fa-folder-open"></i><span>Projets</span></a>
            <a href="board.html" class="nav-link"><i class="fas fa-columns"></i><span>Board Kanban</span></a>
            <a href="taches.html" class="nav-link"><i class="fas fa-tasks"></i><span>Tâches</span></a>
            <a href="roles.html" class="nav-link active"><i class="fas fa-tag"></i><span>Rôles</span></a>
            <a href="etiquette.html" class="nav-link"><i class="fas fa-tags"></i><span>Étiquettes</span></a>
            <a href="profil.html" class="nav-link"><i class="fas fa-user-circle"></i><span>Profil</span></a>
        </div>
    </div>
    <div class="main-content">
        <div class="top-bar">
            <h1 class="page-title"><i class="fas fa-tag"></i> Gestion des rôles</h1>
            <div class="user-badge"><div class="date-badge" id="currentDate"></div><span id="userName">Chargement...</span><div class="avatar-mini" id="userAvatar">👤</div><button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button></div>
        </div>
        <div style="margin-bottom:20px; text-align:right;"><button class="btn btn-primary" id="openAddRoleModal"><i class="fas fa-plus"></i> Nouveau rôle</button></div>
        <div class="card"><table class="data-table"><thead><tr><th>Nom du rôle</th><th>Permissions</th><th>Actions</th></tr></thead><tbody id="rolesList"><tr><td colspan="3" style="text-align:center;">Chargement...</td></tr></tbody></table></div>
    </div>
</div>

<!-- Modal Ajout/Modification Rôle -->
<div id="roleModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">Ajouter un rôle</h3>
        <input type="hidden" id="roleId">
        <label>Nom du rôle</label>
        <input type="text" id="roleNom" placeholder="Ex: Manager, Superviseur..." required>
        <div class="permission-group">
            <h4>Permissions</h4>
            <div class="permission-checkbox"><input type="checkbox" id="permCreateProjects"> <label>📁 Créer des projets</label></div>
            <div class="permission-checkbox"><input type="checkbox" id="permEditProjects"> <label>✏️ Modifier des projets</label></div>
            <div class="permission-checkbox"><input type="checkbox" id="permDeleteProjects"> <label>🗑️ Supprimer des projets</label></div>
            <div class="permission-checkbox"><input type="checkbox" id="permViewTasks"> <label>👁️ Voir les tâches</label></div>
            <div class="permission-checkbox"><input type="checkbox" id="permCreateTasks"> <label>✅ Créer des tâches</label></div>
            <div class="permission-checkbox"><input type="checkbox" id="permEditTasks"> <label>✏️ Modifier les tâches</label></div>
            <div class="permission-checkbox"><input type="checkbox" id="permDeleteTasks"> <label>🗑️ Supprimer des tâches</label></div>
            <div class="permission-checkbox"><input type="checkbox" id="permManageUsers"> <label>👥 Gérer les utilisateurs</label></div>
            <div class="permission-checkbox"><input type="checkbox" id="permManageRoles"> <label>⚙️ Gérer les rôles</label></div>
        </div>
        <div class="modal-buttons">
            <button class="btn btn-secondary" id="closeRoleModal">Annuler</button>
            <button class="btn btn-primary" id="saveRoleBtn">Enregistrer</button>
        </div>
    </div>
</div>

<script>
    const API_URL = 'http://localhost:3002/api';
    const token = localStorage.getItem('token');
    if (!token) window.location.href = 'login.html';
    
    let roles = [];
    
    function showNotification(message, type = 'success') {
        const notification = document.createElement('div');
        notification.className = `notification notification-${type}`;
        notification.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i> ${message}`;
        document.body.appendChild(notification);
        setTimeout(() => notification.remove(), 3000);
    }
    
    function getPermissionsList(role) {
        const perms = [];
        if (role.permissions?.includes('create_projects')) perms.push('📁 Créer projets');
        if (role.permissions?.includes('edit_projects')) perms.push('✏️ Modifier projets');
        if (role.permissions?.includes('delete_projects')) perms.push('🗑️ Supprimer projets');
        if (role.permissions?.includes('view_tasks')) perms.push('👁️ Voir tâches');
        if (role.permissions?.includes('create_tasks')) perms.push('✅ Créer tâches');
        if (role.permissions?.includes('edit_tasks')) perms.push('✏️ Modifier tâches');
        if (role.permissions?.includes('delete_tasks')) perms.push('🗑️ Supprimer tâches');
        if (role.permissions?.includes('manage_users')) perms.push('👥 Gérer utilisateurs');
        if (role.permissions?.includes('manage_roles')) perms.push('⚙️ Gérer rôles');
        if (role.permissions?.includes('*')) perms.push('👑 Toutes les permissions');
        return perms.length > 0 ? perms.join(', ') : 'Aucune permission';
    }
    
    async function loadRoles() {
        try {
            const res = await fetch(`${API_URL}/roles`, { headers: { 'Authorization': `Bearer ${token}` } });
            if (res.status === 401) { localStorage.clear(); window.location.href = 'login.html'; return; }
            roles = await res.json();
            const tbody = document.getElementById('rolesList');
            if (roles.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;">Aucun rôle. Cliquez sur "Nouveau rôle" pour commencer.</td></tr>';
                return;
            }
            tbody.innerHTML = roles.map(r => `
                <tr>
                    <td><strong>${escapeHtml(r.nom)}</strong> <span class="badge ${r.nom === 'admin' ? 'badge-admin' : 'badge-user'}">${r.nom === 'admin' ? 'Admin' : 'Rôle'}</span></td>
                    <td><small>${getPermissionsList(r)}</small></td>
                    <td>
                        <button class="btn btn-warning" onclick="editRole('${r._id}')" style="padding:5px 10px;"><i class="fas fa-edit"></i></button>
                        <button class="btn btn-danger" onclick="deleteRole('${r._id}')" style="padding:5px 10px;"><i class="fas fa-trash"></i></button>
                     </td>
                 </tr>
            `).join('');
        } catch (error) {
            console.error('Erreur:', error);
            showNotification('Erreur de chargement des rôles', 'error');
        }
    }
    
    function getSelectedPermissions() {
        const permissions = [];
        if (document.getElementById('permCreateProjects').checked) permissions.push('create_projects');
        if (document.getElementById('permEditProjects').checked) permissions.push('edit_projects');
        if (document.getElementById('permDeleteProjects').checked) permissions.push('delete_projects');
        if (document.getElementById('permViewTasks').checked) permissions.push('view_tasks');
        if (document.getElementById('permCreateTasks').checked) permissions.push('create_tasks');
        if (document.getElementById('permEditTasks').checked) permissions.push('edit_tasks');
        if (document.getElementById('permDeleteTasks').checked) permissions.push('delete_tasks');
        if (document.getElementById('permManageUsers').checked) permissions.push('manage_users');
        if (document.getElementById('permManageRoles').checked) permissions.push('manage_roles');
        return permissions;
    }
    
    function setPermissionsCheckboxes(permissions) {
        document.getElementById('permCreateProjects').checked = permissions.includes('create_projects');
        document.getElementById('permEditProjects').checked = permissions.includes('edit_projects');
        document.getElementById('permDeleteProjects').checked = permissions.includes('delete_projects');
        document.getElementById('permViewTasks').checked = permissions.includes('view_tasks');
        document.getElementById('permCreateTasks').checked = permissions.includes('create_tasks');
        document.getElementById('permEditTasks').checked = permissions.includes('edit_tasks');
        document.getElementById('permDeleteTasks').checked = permissions.includes('delete_tasks');
        document.getElementById('permManageUsers').checked = permissions.includes('manage_users');
        document.getElementById('permManageRoles').checked = permissions.includes('manage_roles');
    }
    
    async function saveRole() {
        const id = document.getElementById('roleId').value;
        const nom = document.getElementById('roleNom').value.trim();
        const permissions = getSelectedPermissions();
        
        if (!nom) {
            showNotification('Le nom du rôle est requis', 'error');
            return;
        }
        
        const data = { nom, permissions };
        
        try {
            let response;
            if (id) {
                response = await fetch(`${API_URL}/roles/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify(data)
                });
            } else {
                response = await fetch(`${API_URL}/roles`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify(data)
                });
            }
            
            if (response.ok) {
                showNotification(id ? 'Rôle modifié avec succès' : 'Rôle créé avec succès', 'success');
                closeModal();
                loadRoles();
            } else {
                const error = await response.json();
                showNotification(error.message || 'Erreur lors de la sauvegarde', 'error');
            }
        } catch (error) {
            console.error('Erreur:', error);
            showNotification('Erreur de connexion au serveur', 'error');
        }
    }
    
    async function editRole(id) {
        try {
            const res = await fetch(`${API_URL}/roles/${id}`, { headers: { 'Authorization': `Bearer ${token}` } });
            if (res.ok) {
                const role = await res.json();
                document.getElementById('modalTitle').innerText = 'Modifier le rôle';
                document.getElementById('roleId').value = role._id;
                document.getElementById('roleNom').value = role.nom;
                setPermissionsCheckboxes(role.permissions || []);
                document.getElementById('roleModal').style.display = 'flex';
            } else {
                showNotification('Erreur lors du chargement du rôle', 'error');
            }
        } catch (error) {
            showNotification('Erreur de connexion', 'error');
        }
    }
    
    async function deleteRole(id) {
        if (!confirm('Êtes-vous sûr de vouloir supprimer ce rôle ?')) return;
        
        try {
            const response = await fetch(`${API_URL}/roles/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            
            if (response.ok) {
                showNotification('Rôle supprimé avec succès', 'success');
                loadRoles();
            } else {
                showNotification('Erreur lors de la suppression', 'error');
            }
        } catch (error) {
            showNotification('Erreur de connexion', 'error');
        }
    }
    
    function openAddModal() {
        document.getElementById('modalTitle').innerText = 'Ajouter un rôle';
        document.getElementById('roleId').value = '';
        document.getElementById('roleNom').value = '';
        // Décocher toutes les permissions
        const checkboxes = document.querySelectorAll('.permission-checkbox input');
        checkboxes.forEach(cb => cb.checked = false);
        document.getElementById('roleModal').style.display = 'flex';
    }
    
    function closeModal() {
        document.getElementById('roleModal').style.display = 'none';
    }
    
    async function loadUserInfo() {
        try {
            const response = await fetch(`${API_URL}/auth/profil`, { headers: { 'Authorization': `Bearer ${token}` } });
            if (response.ok) {
                const user = await response.json();
                document.getElementById('userName').innerText = user.nom;
                document.getElementById('userAvatar').innerText = user.nom?.charAt(0).toUpperCase() || '👤';
            }
        } catch (error) {}
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }
    
    function logout() {
        localStorage.clear();
        window.location.href = 'login.html';
    }
    
    // Événements
    document.getElementById('currentDate').innerText = new Date().toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
    document.getElementById('openAddRoleModal').onclick = openAddModal;
    document.getElementById('closeRoleModal').onclick = closeModal;
    document.getElementById('saveRoleBtn').onclick = saveRole;
    window.editRole = editRole;
    window.deleteRole = deleteRole;
    window.logout = logout;
    
    // Fermer la modale en cliquant à l'extérieur
    window.onclick = (event) => {
        if (event.target.classList.contains('modal')) {
            closeModal();
        }
    };
    
    loadUserInfo();
    loadRoles();
</script>
</body>
</html>
