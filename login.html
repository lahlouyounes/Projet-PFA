<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | CollabFlow</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .login-container { background: white; border-radius: 20px; padding: 40px; width: 400px; max-width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .logo { text-align: center; font-size: 2rem; font-weight: bold; color: #667eea; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #333; font-weight: 600; }
        .form-group input { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 1rem; }
        .btn-login { width: 100%; padding: 12px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102,126,234,0.4); }
        .error-message { background: #fee2e2; color: #dc2626; padding: 10px; border-radius: 8px; margin-bottom: 20px; display: none; }
        .demo-info { text-align: center; margin-top: 20px; font-size: 0.8rem; color: #666; }
        .demo-info code { background: #f0f0f0; padding: 2px 6px; border-radius: 4px; }
        .loading { display: none; text-align: center; margin-top: 10px; color: #667eea; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo"><i class="fas fa-trello"></i> CollabFlow</div>
        <h2 style="text-align:center; margin-bottom:30px;">Connexion</h2>
        <div id="errorMessage" class="error-message"></div>
        <form id="loginForm">
            <div class="form-group"><label><i class="fas fa-envelope"></i> Email</label><input type="email" id="email" required placeholder="admin@collabflow.com" value="admin@collabflow.com"></div>
            <div class="form-group"><label><i class="fas fa-lock"></i> Mot de passe</label><input type="password" id="password" required placeholder="••••••••" value="admin123"></div>
            <button type="submit" class="btn-login">Se connecter</button>
            <div id="loading" class="loading"><i class="fas fa-spinner fa-spin"></i> Connexion en cours...</div>
        </form>
        <div class="demo-info"><i class="fas fa-flask"></i> Comptes démo:<br><code>admin@collabflow.com</code> / <code>admin123</code><br><code>user@collabflow.com</code> / <code>user123</code></div>
    </div>
    <script>
        const API_URL = 'http://localhost:3002/api';
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            document.getElementById('loading').style.display = 'block';
            document.getElementById('errorMessage').style.display = 'none';
            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();
                if (response.ok && data.token) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = 'index.html';
                } else {
                    document.getElementById('errorMessage').style.display = 'block';
                    document.getElementById('errorMessage').innerHTML = `❌ ${data.message || 'Email ou mot de passe incorrect'}`;
                }
            } catch (error) {
                document.getElementById('errorMessage').style.display = 'block';
                document.getElementById('errorMessage').innerHTML = `❌ Erreur de connexion au serveur. Vérifiez que le backend tourne sur ${API_URL}`;
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        };
    </script>
</body>
</html>
