<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | CollabFlow</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f5f7; }
        .app { display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; position: fixed; height: 100vh; }
        .logo { font-size: 1.5rem; font-weight: bold; padding: 25px 20px; }
        .nav-link { padding: 12px 20px; display: flex; align-items: center; gap: 12px; color: white; text-decoration: none; cursor: pointer; }
        .nav-link:hover, .nav-link.active { background: rgba(255,255,255,0.2); border-left: 3px solid white; }
        .main-content { flex: 1; margin-left: 260px; padding: 20px; }
        .top-bar { background: white; border-radius: 12px; padding: 15px 25px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
        .page-title { font-size: 1.3rem; color: #333; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .stat-number { font-size: 2rem; font-weight: bold; color: #667eea; }
        .charts-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 30px; }
        .chart-card { background: white; padding: 20px; border-radius: 12px; }
        .card { background: white; padding: 20px; border-radius: 12px; }
        .activity-timeline { list-style: none; }
        .activity-timeline li { display: flex; align-items: center; gap: 15px; padding: 12px; border-bottom: 1px solid #eee; }
        .logout-btn { background: none; border: none; color: #e74c3c; cursor: pointer; }
        @media (max-width: 768px) { .sidebar { width: 70px; } .sidebar span { display: none; } .main-content { margin-left: 70px; } .stats-grid { grid-template-columns: 1fr; } .charts-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="app">
    <div class="sidebar">
        <div class="logo"><i class="fas fa-trello"></i><span>CollabFlow</span></div>
        <div class="nav-items">
            <div class="nav-link active" onclick="location.href='index.html'"><i class="fas fa-chart-line"></i><span>Dashboard</span></div>
            <div class="nav-link" onclick="location.href='projets.html'"><i class="fas fa-folder-open"></i><span>Projets</span></div>
            <div class="nav-link" onclick="location.href='board.html'"><i class="fas fa-columns"></i><span>Board</span></div>
            <div class="nav-link" onclick="location.href='taches.html'"><i class="fas fa-tasks"></i><span>Tâches</span></div>
             <a href="roles.html" class="nav-link active"><i class="fas fa-tag"></i><span>Rôles</span></a>
            <div class="nav-link" onclick="window.location.href='etiquette.html'"><i class="fas fa-tags"></i><span>Étiquettes</span></div>
            <div class="nav-link" onclick="location.href='profil.html'"><i class="fas fa-user-circle"></i><span>Profil</span></div>
        </div>
    </div>
    <div class="main-content">
        <div class="top-bar">
            <h1 class="page-title">Tableau de bord</h1>
            <div><span id="userName">Chargement...</span> <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button></div>
        </div>
        
        <div class="stats-grid" id="statsGrid"></div>
        
        <div class="charts-row">
            <div class="chart-card"><h3>Avancement des projets</h3><canvas id="projectsChart"></canvas></div>
            <div class="chart-card"><h3>Répartition des tâches</h3><canvas id="tasksChart"></canvas></div>
        </div>
        
        <div class="card"><h3>Activité récente</h3><ul class="activity-timeline" id="activityList"></ul></div>
    </div>
</div>

<script>
    const API_URL = 'http://localhost:3002/api';
    const token = localStorage.getItem('token');
    
    if (!token) window.location.href = 'login.html';
    
    let projectsChart, tasksChart;
    
    async function loadDashboard() {
        try {
            // Charger les données
            const [projectsRes, tasksRes, usersRes] = await Promise.all([
                fetch(`${API_URL}/projets`, { headers: { 'Authorization': `Bearer ${token}` } }),
                fetch(`${API_URL}/taches`, { headers: { 'Authorization': `Bearer ${token}` } }),
                fetch(`${API_URL}/utilisateurs`, { headers: { 'Authorization': `Bearer ${token}` } })
            ]);
            
            if (projectsRes.status === 401) { localStorage.clear(); window.location.href = 'login.html'; return; }
            
            const projects = await projectsRes.json();
            const tasks = await tasksRes.json();
            const users = await usersRes.json();
            
            // Stats
            const todoCount = tasks.filter(t => t.status === 'todo').length;
            const progressCount = tasks.filter(t => t.status === 'in-progress').length;
            const doneCount = tasks.filter(t => t.status === 'done').length;
            
            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card" onclick="location.href='projets.html'"><div><h3>Projets</h3><div class="stat-number">${projects.length}</div></div><i class="fas fa-folder-open"></i></div>
                <div class="stat-card" onclick="location.href='taches.html'"><div><h3>Tâches terminées</h3><div class="stat-number">${doneCount}</div></div><i class="fas fa-check-circle"></i></div>
                <div class="stat-card" onclick="location.href='taches.html'"><div><h3>Tâches en cours</h3><div class="stat-number">${progressCount}</div></div><i class="fas fa-spinner"></i></div>
                <div class="stat-card" onclick="location.href='profil.html'"><div><h3>Utilisateurs</h3><div class="stat-number">${users.length}</div></div><i class="fas fa-users"></i></div>
            `;
            
            // Graphique projets
            if (projectsChart) projectsChart.destroy();
            projectsChart = new Chart(document.getElementById('projectsChart'), {
                type: 'bar',
                data: { labels: projects.map(p => p.nom), datasets: [{ label: 'Avancement (%)', data: projects.map(p => p.avancement || 0), backgroundColor: '#667eea' }] },
                options: { responsive: true, scales: { y: { max: 100 } } }
            });
            
            // Graphique tâches
            if (tasksChart) tasksChart.destroy();
            tasksChart = new Chart(document.getElementById('tasksChart'), {
                type: 'doughnut',
                data: { labels: ['À faire', 'En cours', 'Terminées'], datasets: [{ data: [todoCount, progressCount, doneCount], backgroundColor: ['#f59e0b', '#3b82f6', '#22c55e'] }] }
            });
            
            // Activités
            const avgProgress = projects.length ? Math.round(projects.reduce((a,b) => a + (b.avancement||0), 0) / projects.length) : 0;
            document.getElementById('activityList').innerHTML = `
                <li><i class="fas fa-check-circle" style="color:#22c55e"></i> ${doneCount} tâches terminées</li>
                <li><i class="fas fa-folder-open" style="color:#3b82f6"></i> ${projects.length} projets actifs</li>
                <li><i class="fas fa-users" style="color:#8b5cf6"></i> ${users.length} utilisateurs</li>
                <li><i class="fas fa-chart-line" style="color:#f59e0b"></i> Avancement moyen: ${avgProgress}%</li>
            `;
        } catch (error) {
            console.error('Erreur:', error);
            document.getElementById('statsGrid').innerHTML = '<div class="stat-card" style="grid-column:span 4;text-align:center">Erreur de chargement</div>';
        }
    }
    
    async function loadUser() {
        try {
            const res = await fetch(`${API_URL}/auth/profil`, { headers: { 'Authorization': `Bearer ${token}` } });
            if (res.ok) { const user = await res.json(); document.getElementById('userName').innerText = user.nom; }
        } catch(e) {}
    }
    
    function logout() { localStorage.clear(); window.location.href = 'login.html'; }
    
    loadUser();
    loadDashboard();
    setInterval(loadDashboard, 30000);
</script>
</body>
</html>
