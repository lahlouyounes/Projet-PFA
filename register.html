<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription | CollabFlow</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .register-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 450px;
            max-width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo {
            text-align: center;
            font-size: 2rem;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
        }
        .btn-register {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        .login-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }
        .login-link a {
            color: #667eea;
            text-decoration: none;
        }
        .message {
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        .success { background: #dcfce7; color: #166534; }
        .error { background: #fee2e2; color: #991b1b; }
        .loading { display: none; text-align: center; margin-top: 10px; color: #667eea; }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="logo"><i class="fas fa-trello"></i> CollabFlow</div>
        <h2 style="text-align:center; margin-bottom:30px;">Créer un compte</h2>
        <div id="message" class="message"></div>
        <form id="registerForm">
            <div class="form-group">
                <label>Nom complet</label>
                <input type="text" id="nom" required placeholder="Alice Martin">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required placeholder="alice@collabflow.com">
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" id="password" required placeholder="Au moins 6 caractères">
            </div>
            <div class="form-group">
                <label>Fonction (optionnel)</label>
                <input type="text" id="fonction" placeholder="Product Owner, Développeur...">
            </div>
            <button type="submit" class="btn-register">S'inscrire</button>
            <div id="loading" class="loading">
                <i class="fas fa-spinner fa-spin"></i> Inscription en cours...
            </div>
        </form>
        <div class="login-link">
            Déjà un compte ? <a href="login.html">Se connecter</a>
        </div>
    </div>

    <script>
        // ⚠️ IMPORTANT: Utilisez le port 3002
        const API_URL = 'http://localhost:3002/api';
        
        document.getElementById('registerForm').onsubmit = async (e) => {
            e.preventDefault();
            
            const nom = document.getElementById('nom').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const fonction = document.getElementById('fonction').value;
            
            if (password.length < 6) {
                const msgDiv = document.getElementById('message');
                msgDiv.className = 'message error';
                msgDiv.style.display = 'block';
                msgDiv.innerHTML = '❌ Le mot de passe doit contenir au moins 6 caractères';
                return;
            }
            
            document.getElementById('loading').style.display = 'block';
            document.getElementById('message').style.display = 'none';
            
            try {
                const response = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nom, email, password, fonction })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    const msgDiv = document.getElementById('message');
                    msgDiv.className = 'message success';
                    msgDiv.style.display = 'block';
                    msgDiv.innerHTML = '✅ Inscription réussie ! Redirection vers la connexion...';
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    const msgDiv = document.getElementById('message');
                    msgDiv.className = 'message error';
                    msgDiv.style.display = 'block';
                    msgDiv.innerHTML = `❌ ${data.message || 'Erreur lors de l\'inscription'}`;
                }
            } catch (error) {
                const msgDiv = document.getElementById('message');
                msgDiv.className = 'message error';
                msgDiv.style.display = 'block';
                msgDiv.innerHTML = `❌ Erreur de connexion au serveur. Vérifiez que le backend tourne sur ${API_URL}`;
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        };
    </script>
</body>
</html>
